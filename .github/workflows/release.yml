name: Release CRX

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile
      - run: yarn build

      - name: Write signing key
        run: echo "${{ secrets.CRX_PRIVATE_KEY }}" > key.pem

      - name: Get extension ID
        id: ext
        run: |
          EXT_ID=$(openssl rsa -in key.pem -pubout -outform DER 2>/dev/null | shasum -a 256 | head -c 32 | tr '0-9a-f' 'a-p')
          echo "id=$EXT_ID" >> "$GITHUB_OUTPUT"
          echo "Extension ID: $EXT_ID"

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Pack CRX
        run: |
          npm install crx
          node -e "
          const fs = require('fs');
          const ChromeExtension = require('crx');
          const crx = new ChromeExtension({ privateKey: fs.readFileSync('key.pem') });
          crx.load('build/chrome-mv3-prod')
            .then(c => c.pack())
            .then(buf => {
              fs.writeFileSync('hover-translate.crx', buf);
              console.log('CRX packed successfully:', buf.length, 'bytes');
            })
            .catch(e => { console.error(e); process.exit(1); });
          "

      - name: Verify CRX extension ID
        run: |
          node -e "
          const fs = require('fs');
          const crypto = require('crypto');
          const { execSync } = require('child_process');
          const pubDer = execSync('openssl rsa -in key.pem -pubout -outform DER 2>/dev/null');
          const hash = crypto.createHash('sha256').update(pubDer).digest('hex').slice(0, 32);
          const id = hash.replace(/[0-9a-f]/g, c => String.fromCharCode('a'.charCodeAt(0) + parseInt(c, 16)));
          console.log('Expected ID:', id);
          "

      - name: Update update.xml
        run: |
          cat > update.xml <<EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='${{ steps.ext.outputs.id }}'>
              <updatecheck codebase='https://github.com/mrsekut/hover-translate/releases/latest/download/hover-translate.crx' version='${{ steps.version.outputs.version }}' />
            </app>
          </gupdate>
          EOF

      - name: Commit update.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.xml
          git diff --staged --quiet || git commit -m "update update.xml [skip ci]" && git push

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest hover-translate.crx \
            --title "v${{ steps.version.outputs.version }}" \
            --latest \
            --notes "Auto-built from ${{ github.sha }}"
